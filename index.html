<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Amitis - تمرین تشخیص روند</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            min-height: 100vh;
            background: #0a0a0a;
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            direction: rtl;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        body::-webkit-scrollbar {
            width: 5px;
        }
        body::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        body::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 10px;
        }
        body::-webkit-scrollbar-thumb:hover {
            background: #3a3a3a;
        }

        .glass-main {
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            background: #111111;
            padding: 24px 14px 40px;
            border-left: 1px solid #1a1a1a;
            border-right: 1px solid #1a1a1a;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px 20px;
            margin-bottom: 55px;
            gap: 10px;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.3s cubic-bezier(0.22, 1, 0.36, 1), background 0.3s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .header:hover {
            border-color: #ffffff !important;
            border-width: 1px !important;
            box-shadow: 0 8px 50px rgba(0, 0, 0, 0.4), 0 0 60px rgba(255, 255, 255, 0.04) !important;
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.04) !important;
        }

        .header .deco-left,
        .header .deco-right {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .header .deco-line {
            width: 25px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #555555);
            border-radius: 2px;
        }
        .header .deco-line-right {
            background: linear-gradient(90deg, #555555, transparent);
        }
        .header .deco-line-thick {
            width: 10px;
            height: 2px;
            background: #444444;
            border-radius: 2px;
        }
        .header .deco-dot {
            width: 4px;
            height: 4px;
            background: #555555;
            border-radius: 50%;
            display: inline-block;
        }
        .header .deco-dot-outline {
            width: 5px;
            height: 5px;
            border: 1px solid #444444;
            border-radius: 50%;
            display: inline-block;
        }
        .header .deco-diamond {
            width: 5px;
            height: 5px;
            background: #555555;
            transform: rotate(45deg);
            display: inline-block;
        }
        .header .deco-dash {
            width: 16px;
            height: 0;
            border-top: 1px dashed #3a3a3a;
            display: inline-block;
        }
        .header .deco-circle {
            width: 6px;
            height: 6px;
            border: 1px solid #444444;
            border-radius: 50%;
            display: inline-block;
        }
        .header .brand {
            font-size: 24px;
            font-weight: 700;
            color: #555555;
            letter-spacing: 5px;
            text-transform: uppercase;
            padding: 0 6px;
        }
        .header .brand strong {
            color: #dddddd;
            font-weight: 600;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.03);
        }

        @media (max-width: 480px) {
            .glass-main {
                padding: 14px 8px 24px;
            }
            .header {
                padding: 12px 14px;
                margin-bottom: 40px;
                border-radius: 16px;
            }
            .header .deco-line {
                width: 12px;
            }
            .header .deco-dash {
                width: 10px;
            }
            .header .deco-line-thick {
                width: 6px;
            }
            .header .brand {
                font-size: 18px;
                letter-spacing: 3px;
            }
            .header .deco-dot-outline {
                width: 4px;
                height: 4px;
            }
            .header .deco-circle {
                width: 5px;
                height: 5px;
            }
            .header .deco-diamond {
                width: 4px;
                height: 4px;
            }
        }
        @media (max-width: 768px) {
            .header {
                margin-bottom: 45px;
            }
        }

        .item {
            margin-bottom: 30px;
            padding-bottom: 20px;
        }
        .item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .exercise-separator {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 70px 0 80px;
            margin: 0 10px;
        }
        .exercise-separator .star {
            color: #555555;
            font-size: 32px;
            padding: 0 20px;
            transition: all 0.3s ease;
        }
        .exercise-separator .star:hover {
            color: #888888;
            transform: scale(1.1);
        }
        .exercise-separator .line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #333333, #555555, #333333, transparent);
            border-radius: 2px;
        }

        .chart-box {
            background: #141414;
            border-radius: 16px;
            padding: 10px 10px 8px;
            border: 1px solid #2a2a2a;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.3s cubic-bezier(0.22, 1, 0.36, 1), background 0.3s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .chart-box:hover {
            border-color: #ffffff !important;
            border-width: 1px !important;
            box-shadow: 0 16px 60px rgba(0, 0, 0, 0.7), 0 0 80px rgba(255, 255, 255, 0.04), inset 0 0 40px rgba(255, 255, 255, 0.02) !important;
            transform: translateY(-8px) scale(1.005);
            background: #1e1e1e !important;
        }

        .chart-box.answer-box {
            margin-top: 100px;
            background: #161616;
            border-color: #323232;
            border-width: 1px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.3s cubic-bezier(0.22, 1, 0.36, 1), background 0.3s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .chart-box.answer-box:hover {
            border-color: #ffffff !important;
            border-width: 1px !important;
            box-shadow: 0 16px 60px rgba(0, 0, 0, 0.7), 0 0 80px rgba(255, 255, 255, 0.045), inset 0 0 40px rgba(255, 255, 255, 0.025) !important;
            transform: translateY(-8px) scale(1.005);
            background: #202020 !important;
        }

        .label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .label .title {
            font-size: 14px;
            font-weight: 700;
            color: #aaa;
        }
        .label .title .num {
            color: #333;
            font-weight: 400;
        }
        .label .badge {
            font-size: 9px;
            color: #333;
            background: #1a1a1a;
            padding: 2px 12px;
            border-radius: 30px;
            border: 1px solid #222;
        }
        .label .badge.green {
            color: #555;
            border-color: #2a2a2a;
        }

        /* حذف footer-text از همه جای صفحه */
        .footer-text {
            display: none !important;
        }

        .toolbar {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
            flex-wrap: wrap;
            align-items: center;
        }
        .toolbar button {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #666;
            padding: 3px 12px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            position: relative;
            z-index: 2;
        }
        .toolbar button:hover {
            background: #2a2a2a;
            border-color: #444;
            color: #aaa;
        }
        .toolbar button.active {
            background: #2a2a2a;
            border-color: #ffffff;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .toolbar .new-exercise-btn {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #666;
            padding: 3px 12px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            position: relative;
            z-index: 2;
        }
        .toolbar .new-exercise-btn:hover {
            background: #2a2a2a;
            border-color: #444;
            color: #aaa;
        }

        /* ===== شمارنده تمرین - نازک و سفید ===== */
        .exercise-counter-inline {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            padding: 2px 4px 2px 2px;
            font-size: 11px;
            color: #666;
            font-family: inherit;
            user-select: none;
            white-space: nowrap;
        }
        .exercise-counter-inline .counter-label {
            color: #888;
            font-weight: 300;
            font-size: 10px;
            letter-spacing: 0.3px;
        }
        .exercise-counter-inline .counter-number {
            color: #ffffff;
            font-weight: 400;
            font-size: 13px;
            min-width: 18px;
            text-align: center;
            background: transparent;
            padding: 0 2px;
            opacity: 0.8;
        }

        /* ===== تعداد کل تمرین های حل شده - عدد نئون سفید ===== */
        .record-item-inline {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 3px 10px 3px 8px;
            font-size: 11px;
            color: #666;
            font-family: inherit;
            user-select: none;
            white-space: nowrap;
        }
        .record-item-inline .record-label {
            color: #888;
            font-weight: 300;
            font-size: 10px;
            letter-spacing: 0.2px;
        }
        /* عدد نئون سفید */
        .record-item-inline .record-value-white {
            font-weight: 700;
            font-size: 14px;
            min-width: 20px;
            text-align: center;
            padding: 0 2px;
            color: #ffffff;
            text-shadow: 0 0 8px #ffffff, 0 0 20px #aaaaaa, 0 0 40px #888888;
            animation: whitePulse 1.5s ease-in-out infinite alternate;
        }

        @keyframes whitePulse {
            0% {
                text-shadow: 0 0 4px #ffffff, 0 0 10px #aaaaaa, 0 0 20px #888888;
                opacity: 0.85;
            }
            100% {
                text-shadow: 0 0 12px #ffffff, 0 0 30px #cccccc, 0 0 60px #aaaaaa, 0 0 80px #888888;
                opacity: 1;
            }
        }

        /* ===== NEW RECORD نئونی طلایی ===== */
        .new-record-badge-inline {
            display: none;
            font-size: 11px;
            font-weight: 700;
            color: #ffdd00;
            text-shadow: 0 0 8px #ffdd00, 0 0 20px #ffaa00, 0 0 40px #ff8800, 0 0 80px #ff6600;
            animation: neonPulseGold 0.7s ease-in-out infinite alternate;
            letter-spacing: 1px;
            padding: 2px 10px;
            border-radius: 6px;
            background: rgba(255, 215, 0, 0.04);
            border: 1px solid rgba(255, 215, 0, 0.12);
        }
        .new-record-badge-inline.show {
            display: inline-block;
        }

        @keyframes neonPulseGold {
            0% {
                text-shadow: 0 0 4px #ffdd00, 0 0 10px #ffaa00, 0 0 20px #ff8800, 0 0 40px #ff6600;
                opacity: 0.8;
                transform: scale(0.98);
            }
            100% {
                text-shadow: 0 0 12px #ffdd00, 0 0 30px #ffaa00, 0 0 60px #ff8800, 0 0 100px #ff6600, 0 0 140px #ff4400;
                opacity: 1;
                transform: scale(1.02);
            }
        }

        .toolbar-divider {
            color: #2a2a2a;
            font-size: 14px;
            font-weight: 100;
            padding: 0 2px;
            user-select: none;
        }

        @media (max-width: 480px) {
            .record-item-inline {
                padding: 2px 6px 2px 5px;
                font-size: 9px;
            }
            .record-item-inline .record-value-white {
                font-size: 12px;
                min-width: 14px;
            }
            .record-item-inline .record-label {
                font-size: 8px;
            }
            .new-record-badge-inline {
                font-size: 9px;
                padding: 1px 6px;
            }
            .exercise-counter-inline {
                font-size: 9px;
            }
            .exercise-counter-inline .counter-number {
                font-size: 11px;
                min-width: 14px;
            }
            .exercise-counter-inline .counter-label {
                font-size: 8px;
            }
            .toolbar-divider {
                font-size: 10px;
            }
        }

        .spoiler-btn {
            background: transparent;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 5px 16px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            margin-top: 4px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 2;
            letter-spacing: 0.5px;
        }
        .spoiler-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #aaaaaa;
            color: #ffffff;
        }
        .spoiler-btn.active {
            background: rgba(255, 255, 255, 0.03);
            border-color: #ffffff;
            color: #ffffff;
        }

        .spoiler-content {
            display: none;
            margin-top: 8px;
            animation: fadeIn 0.4s ease;
        }
        .spoiler-content.show {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .svg-wrap {
            background: #0a0a0a;
            border-radius: 12px;
            padding: 4px;
            border: 1px solid #161616;
            overflow: hidden;
            position: relative;
            touch-action: none;
        }
        .svg-wrap svg {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 8px;
            background: #0a0a0a;
            touch-action: none;
            pointer-events: all;
        }

        /* حذف زیرنویس جواب */
        .answer-box .footer-text {
            display: none !important;
        }

        .global-footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #222;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 16px;
            color: #444;
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 0.5px;
            flex-wrap: wrap;
        }
        .global-footer .brand-name {
            color: #888;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .global-footer .brand-name .highlight {
            color: #ccc;
            font-weight: 600;
        }
        .global-footer .version {
            color: #555;
            font-size: 12px;
            font-weight: 600;
            background: #1a1a1a;
            padding: 2px 12px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            letter-spacing: 0.5px;
        }
        .global-footer .dot-sep {
            color: #333;
            font-size: 8px;
        }

        @media (max-width: 480px) {
            .glass-main {
                padding: 12px 6px 20px;
            }
            .header {
                padding: 10px 10px;
                margin-bottom: 30px;
                border-radius: 14px;
            }
            .header .brand {
                font-size: 16px;
                letter-spacing: 2px;
            }
            .chart-box {
                padding: 6px 4px 4px;
                border-radius: 12px;
            }
            .chart-box.answer-box {
                margin-top: 50px;
            }
            .item {
                margin-bottom: 16px;
                padding-bottom: 12px;
            }
            .exercise-separator {
                padding: 45px 0 55px;
            }
            .exercise-separator .star {
                font-size: 24px;
            }
            .toolbar button {
                padding: 2px 8px;
                font-size: 9px;
            }
            .spoiler-btn {
                padding: 4px 12px;
                font-size: 10px;
            }
            .global-footer {
                font-size: 10px;
                gap: 10px;
                justify-content: center;
            }
            .global-footer .brand-name {
                font-size: 11px;
            }
            .global-footer .version {
                font-size: 10px;
            }
        }
        @media (max-width: 768px) {
            .chart-box.answer-box {
                margin-top: 40px;
            }
        }
    </style>
</head>

    <script>
        // ================================================================
        // Amirkazem Coding - v62 (Fixed)
        // ================================================================

        // ================================================================
        // سیستم رکورد - localStorage
        // ================================================================

        const STORAGE_KEY = 'amitis_trend_record';

        function getBestRecord() {
            const val = localStorage.getItem(STORAGE_KEY);
            return val ? parseInt(val, 10) : 0;
        }

        function setBestRecord(value) {
            localStorage.setItem(STORAGE_KEY, String(value));

        // ================================================================
        // شمارنده تمرین ۳ - با رفرش از ۱ شروع میشه
        // ================================================================
        let exercise3Counter = 1;
        let bestRecord = getBestRecord();

        function updateRecordDisplay() {

            const badge = document.getElementById('newRecordBadge');

                setBestRecord(bestRecord);
                document.getElementById('bestRecordDisplay').textContent = bestRecord;
            } else {
                badge.classList.remove('show');
            }
        }

        function incrementExercise3Counter() {
            exercise3Counter++;
            document.getElementById('exerciseCounter3').textContent = exercise3Counter;
            updateRecordDisplay();
        }

        // ================================================================
        // GENERATOR 106 CANDLES
        // ================================================================

        const GLOBAL_MIN = 26;
        const GLOBAL_MAX = 86;
        const WAVE_SIZE = 7;

        let CURRENT_RANGE_MIN = 29;
        let CURRENT_RANGE_MAX = 64;

        function generateRandomRange() {
            const rangeHeight = 20 + Math.random() * 13;
            const maxStart = GLOBAL_MAX - GLOBAL_MIN - rangeHeight;
            const start = GLOBAL_MIN + Math.random() * maxStart;
            CURRENT_RANGE_MIN = Math.round(start);
            CURRENT_RANGE_MAX = Math.round(start + rangeHeight);
            CURRENT_RANGE_MIN = Math.max(GLOBAL_MIN, Math.min(GLOBAL_MAX - rangeHeight, CURRENT_RANGE_MIN));
            CURRENT_RANGE_MAX = CURRENT_RANGE_MIN + Math.round(rangeHeight);
            CURRENT_RANGE_MAX = Math.min(GLOBAL_MAX, CURRENT_RANGE_MAX);
        }

        function getWickType() {
            const r = Math.random();
            if (r < 0.25) return 0;
            if (r < 0.50) return 1;
            if (r < 0.75) return 2;
            return 3;
        }

        function generateStandardCandle(currentPrice, closePrice, minLimit, maxLimit) {
            const open = Math.round(currentPrice * 100) / 100;
            const close = Math.round(closePrice * 100) / 100;
            const wickType = getWickType();
            let high = Math.max(open, close);
            let low = Math.min(open, close);
            if (wickType === 1 || wickType === 3) {
                high = Math.round((Math.max(open, close) + 1.5 + Math.random() * 2.5) * 100) / 100;
            }
            if (wickType === 2 || wickType === 3) {
                low = Math.round((Math.min(open, close) - 1.5 - Math.random() * 2.5) * 100) / 100;
            }
            high = Math.min(maxLimit, Math.max(minLimit, high));
            low = Math.max(minLimit, Math.min(maxLimit, low));
            return { high, low, open, close };
        }

        function generateRandomCandle(currentPrice, allowSpike = false) {
            let move;
            if (allowSpike && Math.random() < 0.12) {
                move = (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 4);
            } else {
                move = (Math.random() - 0.5) * 6;
            }
            let close = Math.round((currentPrice + move) * 100) / 100;
            close = Math.max(GLOBAL_MIN + 0.5, Math.min(GLOBAL_MAX - 0.5, close));
            return generateStandardCandle(currentPrice, close, GLOBAL_MIN, GLOBAL_MAX);
        }

        function generatePumpCandles(currentPrice, direction) {
            const candles = [];
            const moves = direction === 'up' ? [6, 3, 7, 4] : [-6, -3, -7, -4];
            for (let i = 0; i < 4; i++) {
                let targetPrice = currentPrice + moves[i];
                targetPrice = Math.max(GLOBAL_MIN + 0.5, Math.min(GLOBAL_MAX - 0.5, targetPrice));
                const noise = (Math.random() - 0.5) * 1.5;
                let close = Math.round((targetPrice + noise) * 100) / 100;
                close = Math.max(GLOBAL_MIN + 0.5, Math.min(GLOBAL_MAX - 0.5, close));
                const candle = generateStandardCandle(currentPrice, close, GLOBAL_MIN, GLOBAL_MAX);
                candles.push(candle);
                currentPrice = candle.close;
            }
            return { candles, lastPrice: currentPrice };
        }

        let RANGE_CANDLE_INDICES = [];

        function generateWaveCandles(startPrice) {
            const candles = [];
            let currentPrice = startPrice;
            RANGE_CANDLE_INDICES = [];

            if (currentPrice < CURRENT_RANGE_MIN) {
                const steps = Math.min(3, Math.ceil((CURRENT_RANGE_MIN - currentPrice) / 2));
                for (let i = 0; i < steps; i++) {
                    const progress = (i + 1) / (steps + 1);
                    const targetPrice = currentPrice + (CURRENT_RANGE_MIN - currentPrice) * progress + 0.5;
                    const close = Math.min(targetPrice, CURRENT_RANGE_MIN + 0.5);
                    const candle = generateStandardCandle(currentPrice, close, GLOBAL_MIN, GLOBAL_MAX);
                    candles.push(candle);
                    currentPrice = candle.close;
                }
            } else if (currentPrice > CURRENT_RANGE_MAX) {
                const steps = Math.min(3, Math.ceil((currentPrice - CURRENT_RANGE_MAX) / 2));
                for (let i = 0; i < steps; i++) {
                    const progress = (i + 1) / (steps + 1);
                    const targetPrice = currentPrice - (currentPrice - CURRENT_RANGE_MAX) * progress - 0.5;
                    const close = Math.max(targetPrice, CURRENT_RANGE_MAX - 0.5);
                    const candle = generateStandardCandle(currentPrice, close, GLOBAL_MIN, GLOBAL_MAX);
                    candles.push(candle);
                    currentPrice = candle.close;
                }
            }

            if (currentPrice < CURRENT_RANGE_MIN) {
                const candle = generateStandardCandle(currentPrice, CURRENT_RANGE_MIN + 0.5, GLOBAL_MIN, GLOBAL_MAX);
                candles.push(candle);
                currentPrice = candle.close;
            } else if (currentPrice > CURRENT_RANGE_MAX) {
                const candle = generateStandardCandle(currentPrice, CURRENT_RANGE_MAX - 0.5, GLOBAL_MIN, GLOBAL_MAX);
                candles.push(candle);
                currentPrice = candle.close;
            }

            const waves = [
                { dir: 'down', start: CURRENT_RANGE_MAX, end: CURRENT_RANGE_MIN },
                { dir: 'up', start: CURRENT_RANGE_MIN, end: CURRENT_RANGE_MAX },
                { dir: 'down', start: CURRENT_RANGE_MAX, end: CURRENT_RANGE_MIN },
                { dir: 'up', start: CURRENT_RANGE_MIN, end: CURRENT_RANGE_MAX },
                { dir: 'down', start: CURRENT_RANGE_MAX, end: CURRENT_RANGE_MIN },
                { dir: 'up', start: CURRENT_RANGE_MIN, end: CURRENT_RANGE_MAX },
                { dir: 'down', start: CURRENT_RANGE_MAX, end: CURRENT_RANGE_MIN },
                { dir: 'up', start: CURRENT_RANGE_MIN, end: CURRENT_RANGE_MAX }
            ];

            waves.forEach((wave) => {
                const isDown = wave.dir === 'down';
                const startPrice = wave.start;
                const endPrice = wave.end;
                const reverseCount = Math.random() < 0.5 ? 3 : 4;
                const reversePos = [];
                while (reversePos.length < reverseCount) {
                    const pos = Math.floor(Math.random() * WAVE_SIZE);
                    if (!reversePos.includes(pos)) reversePos.push(pos);
                }
                reversePos.sort();

                for (let i = 0; i < WAVE_SIZE; i++) {
                    const progress = (i + 1) / WAVE_SIZE;
                    let targetPrice = startPrice + (endPrice - startPrice) * progress;
                    const isReverse = reversePos.includes(i);
                    let close;
                    if (isReverse) {
                        const offset = (Math.random() * 3 + 2) * (isDown ? 1 : -1);
                        close = Math.round((targetPrice + offset) * 100) / 100;
                    } else {
                        const noise = (Math.random() - 0.5) * 1.2;
                        close = Math.round((targetPrice + noise) * 100) / 100;
                    }
                    close = Math.max(CURRENT_RANGE_MIN + 0.5, Math.min(CURRENT_RANGE_MAX - 0.5, close));
                    const candle = generateStandardCandle(currentPrice, close, CURRENT_RANGE_MIN, CURRENT_RANGE_MAX);
                    candles.push(candle);
                    RANGE_CANDLE_INDICES.push(candles.length - 1);
                    currentPrice = candle.close;
                }
            });

            return { candles, lastPrice: currentPrice };
        }

        function shuffleSections() {
            const sections = [
                { type: 'random', count: 18 },
                { type: 'random', count: 28 },
                { type: 'pump', count: 4 },
                { type: 'range', count: 56 }
            ];
            for (let i = sections.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [sections[i], sections[j]] = [sections[j], sections[i]];
            }
            return sections;
        }

        function generateAllCandles() {
            generateRandomRange();
            const shuffledSections = shuffleSections();
            const allCandles = [];
            let currentPrice = 40;
            const pumpDirection = Math.random() < 0.5 ? 'up' : 'down';
            RANGE_CANDLE_INDICES = [];

            shuffledSections.forEach((section) => {
                if (section.type === 'random') {
                    for (let i = 0; i < section.count; i++) {
                        const candle = generateRandomCandle(currentPrice, true);
                        allCandles.push(candle);
                        currentPrice = candle.close;
                    }
                } else if (section.type === 'pump') {
                    const pumpResult = generatePumpCandles(currentPrice, pumpDirection);
                    allCandles.push(...pumpResult.candles);
                    currentPrice = pumpResult.lastPrice;
                } else if (section.type === 'range') {
                    const waveResult = generateWaveCandles(currentPrice);
                    const baseIndex = allCandles.length;
                    const rangeIndices = RANGE_CANDLE_INDICES.map(idx => idx + baseIndex);
                    RANGE_CANDLE_INDICES = rangeIndices;
                    allCandles.push(...waveResult.candles);
                    currentPrice = waveResult.lastPrice;
                }
            });

            return allCandles;
        }

        function findRangeInCandles(candles) {
            return { min: CURRENT_RANGE_MIN, max: CURRENT_RANGE_MAX };
        }

        // ================================================================
        // RENDER FUNCTION
        // ================================================================

        function renderCandlesOnSvg(svg, candles, minPrice, maxPrice, showAnswerLine = false, rangeMin = null, rangeMax =
            null) {
            const ns = 'http://www.w3.org/2000/svg';

            const toRemove = [];
            for (let i = 0; i < svg.children.length; i++) {
                const child = svg.children[i];
                const isGrid = child.tagName === 'line' && child.getAttribute('stroke') === '#151515';
                const isLabel = child.tagName === 'text' && !child.id;
                const isAnswerLine = child.tagName === 'line' && child.getAttribute('stroke') === '#ff9b00' && child
                    .getAttribute('stroke-width') === '2';
                const isBg = child.tagName === 'rect' && child.getAttribute('fill') === '#0a0a0a';
                if (!isGrid && !isLabel && !isBg) {
                    toRemove.push(child);
                }
            }
            toRemove.forEach(el => el.remove());

            const padding = 28;
            const chartWidth = 370;
            const chartHeight = 170;
            const baseY = 190;

            const candleWidth = chartWidth / candles.length;
            const bodyWidth = Math.max(3, candleWidth * 0.6);

            let firstRangeIndex = -1;
            let lastRangeIndex = -1;

            if (showAnswerLine && rangeMin !== null && rangeMax !== null) {
                if (RANGE_CANDLE_INDICES.length > 0) {
                    firstRangeIndex = RANGE_CANDLE_INDICES[0];
                    lastRangeIndex = RANGE_CANDLE_INDICES[RANGE_CANDLE_INDICES.length - 1];
                }
            }

            candles.forEach((candle, index) => {
                const x = padding + (index * candleWidth) + (candleWidth - bodyWidth) / 2;

                const high = Math.min(maxPrice, Math.max(minPrice, candle.high));
                const low = Math.min(maxPrice, Math.max(minPrice, candle.low));
                const open = Math.min(high, Math.max(low, candle.open));
                const close = Math.min(high, Math.max(low, candle.close));

                const yHigh = baseY - ((high - minPrice) / (maxPrice - minPrice)) * chartHeight;
                const yLow = baseY - ((low - minPrice) / (maxPrice - minPrice)) * chartHeight;
                const yOpen = baseY - ((open - minPrice) / (maxPrice - minPrice)) * chartHeight;
                const yClose = baseY - ((close - minPrice) / (maxPrice - minPrice)) * chartHeight;

                const isUp = close >= open;
                const color = isUp ? '#ffffff' : '#890913';

                const bodyY = Math.min(yOpen, yClose);
                const bodyH = Math.max(1.5, Math.abs(yOpen - yClose));

                const rect = document.createElementNS(ns, 'rect');
                rect.setAttribute('x', x);
                rect.setAttribute('y', bodyY);
                rect.setAttribute('width', bodyWidth);
                rect.setAttribute('height', bodyH);
                rect.setAttribute('fill', color);
                rect.setAttribute('rx', '0');
                rect.setAttribute('opacity', '0.95');
                svg.appendChild(rect);

                if (yHigh < bodyY) {
                    const lineTop = document.createElementNS(ns, 'line');
                    lineTop.setAttribute('x1', x + bodyWidth / 2);
                    lineTop.setAttribute('y1', yHigh);
                    lineTop.setAttribute('x2', x + bodyWidth / 2);
                    lineTop.setAttribute('y2', bodyY);
                    lineTop.setAttribute('stroke', color);
                    lineTop.setAttribute('stroke-width', Math.max(0.8, bodyWidth / 6));
                    lineTop.setAttribute('opacity', '0.8');
                    svg.appendChild(lineTop);
                }

                if (yLow > bodyY + bodyH) {
                    const lineBottom = document.createElementNS(ns, 'line');
                    lineBottom.setAttribute('x1', x + bodyWidth / 2);
                    lineBottom.setAttribute('y1', bodyY + bodyH);
                    lineBottom.setAttribute('x2', x + bodyWidth / 2);
                    lineBottom.setAttribute('y2', yLow);
                    lineBottom.setAttribute('stroke', color);
                    lineBottom.setAttribute('stroke-width', Math.max(0.8, bodyWidth / 6));
                    lineBottom.setAttribute('opacity', '0.8');
                    svg.appendChild(lineBottom);
                }
            });

            if (showAnswerLine && rangeMin !== null && rangeMax !== null && firstRangeIndex !== -1 && lastRangeIndex !==
                -1) {
                const firstX = padding + (firstRangeIndex * candleWidth) + (candleWidth - bodyWidth) / 2 + bodyWidth / 2;
                const lastX = padding + (lastRangeIndex * candleWidth) + (candleWidth - bodyWidth) / 2 + bodyWidth / 2;

                const yTop = baseY - ((rangeMax - minPrice) / (maxPrice - minPrice)) * chartHeight;
                const yBottom = baseY - ((rangeMin - minPrice) / (maxPrice - minPrice)) * chartHeight;

                const lineTop = document.createElementNS(ns, 'line');
                lineTop.setAttribute('x1', firstX);
                lineTop.setAttribute('y1', yTop);
                lineTop.setAttribute('x2', lastX);
                lineTop.setAttribute('y2', yTop);
                lineTop.setAttribute('stroke', '#ff9b00');
                lineTop.setAttribute('stroke-width', '2');
                lineTop.setAttribute('opacity', '0.7');
                svg.appendChild(lineTop);

                const lineBottom = document.createElementNS(ns, 'line');
                lineBottom.setAttribute('x1', firstX);
                lineBottom.setAttribute('y1', yBottom);
                lineBottom.setAttribute('x2', lastX);
                lineBottom.setAttribute('y2', yBottom);
                lineBottom.setAttribute('stroke', '#ff9b00');
                lineBottom.setAttribute('stroke-width', '2');
                lineBottom.setAttribute('opacity', '0.7');
                svg.appendChild(lineBottom);
            }
        }

        // ================================================================
        // GENERATE NEW EXERCISE 3
        // ================================================================

        let currentExercise3Candles = [];

        function generateNewExercise3(incrementCounter = true) {
            const candles = generateAllCandles();
            currentExercise3Candles = candles;

            const range = findRangeInCandles(candles);

            const mainSvg = document.getElementById('s3');
            renderCandlesOnSvg(mainSvg, candles, GLOBAL_MIN, GLOBAL_MAX, false);

            const answerSvg = document.getElementById('answerSvg3');
            renderCandlesOnSvg(answerSvg, candles, GLOBAL_MIN, GLOBAL_MAX, true, range.min, range.max);

            const spoilerBtn = document.getElementById('spoilerBtn3');
            const spoilerContent = document.getElementById('spoilerContent3');
            if (spoilerContent.classList.contains('show')) {
                spoilerContent.classList.remove('show');
                spoilerBtn.textContent = 'نمایش جواب';
                spoilerBtn.classList.remove('active');
            }

            document.getElementById('badge3').style.display = 'none';

            const lines = mainSvg.querySelectorAll('line');
            lines.forEach(line => {
                if (line.getAttribute('stroke') === '#ff9b00' && line.getAttribute('stroke-width') === '1.5') {
                    line.remove();
                }
            });

            // فقط اگر incrementCounter = true باشه، شمارنده رو افزایش بده
            if (incrementCounter) {
                incrementExercise3Counter();
            }
        }

        // ================================================================
        // TOGGLE SPOILER
        // ================================================================

        function toggleSpoiler(btn) {
            const content = btn.nextElementSibling;
            if (content.classList.contains('show')) {
                content.classList.remove('show');
                btn.textContent = 'نمایش جواب';
                btn.classList.remove('active');
            } else {
                content.classList.add('show');
                btn.textContent = 'بستن جواب';
                btn.classList.add('active');
            }
        }

        // ================================================================
        // TREND LINE TOOLS (خلاصه شده)
        // ================================================================

        const history = {};

        function getHistory(svgId) {
            if (!history[svgId]) {
                history[svgId] = { undo: [], redo: [] };
            }
            return history[svgId];
        }

        function saveLine(svgId, line) {
            const h = getHistory(svgId);
            h.undo.push(line);
            h.redo = [];
        }

        function isMobile() {
            return /Mobi|Android|iPhone|iPad|iPod|BlackBerry|Opera Mini|IEMobile/i.test(navigator.userAgent);
        }

        document.querySelectorAll('.trend-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const targetId = this.dataset.target;
                const svg = document.getElementById(targetId);
                if (!svg) return;

                if (this.classList.contains('active')) {
                    this.classList.remove('active');
                    svg.style.cursor = 'default';
                    svg.dataset.drawing = 'false';
                    svg.dataset.step = '0';
                    svg.dataset.startX = '';
                    svg.dataset.startY = '';
                    const tempLine = svg.querySelector('.temp-line');
                    if (tempLine) tempLine.remove();
                    const crosshair = svg.querySelector('.trend-crosshair');
                    if (crosshair) crosshair.remove();
                    const startPoint = svg.querySelector('.start-point');
                    if (startPoint) startPoint.remove();
                    return;
                }

                document.querySelectorAll('.trend-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('svg').forEach(s => {
                    s.style.cursor = 'default';
                    s.dataset.drawing = 'false';
                    s.dataset.step = '0';
                    s.dataset.startX = '';
                    s.dataset.startY = '';
                    const tl = s.querySelector('.temp-line');
                    if (tl) tl.remove();
                    const ch = s.querySelector('.trend-crosshair');
                    if (ch) ch.remove();
                    const sp = s.querySelector('.start-point');
                    if (sp) sp.remove();
                });

                this.classList.add('active');
                svg.style.cursor = 'crosshair';
                svg.dataset.drawing = 'true';
                svg.dataset.step = '0';
                svg.dataset.startX = '';
                svg.dataset.startY = '';

                const ns = 'http://www.w3.org/2000/svg';
                const crosshair = document.createElementNS(ns, 'g');
                crosshair.classList.add('trend-crosshair');
                crosshair.style.display = 'none';

                const vLine = document.createElementNS(ns, 'line');
                vLine.setAttribute('x1', '0');
                vLine.setAttribute('y1', '0');
                vLine.setAttribute('x2', '0');
                vLine.setAttribute('y2', '200');
                vLine.setAttribute('stroke', 'rgba(255,255,255,0.15)');
                vLine.setAttribute('stroke-width', '0.5');
                vLine.setAttribute('stroke-dasharray', '3,3');

                const hLine = document.createElementNS(ns, 'line');
                hLine.setAttribute('x1', '0');
                hLine.setAttribute('y1', '0');
                hLine.setAttribute('x2', '400');
                hLine.setAttribute('y2', '0');
                hLine.setAttribute('stroke', 'rgba(255,255,255,0.15)');
                hLine.setAttribute('stroke-width', '0.5');
                hLine.setAttribute('stroke-dasharray', '3,3');

                const circle = document.createElementNS(ns, 'circle');
                circle.setAttribute('cx', '0');
                circle.setAttribute('cy', '0');
                circle.setAttribute('r', '5');
                circle.setAttribute('fill', 'none');
                circle.setAttribute('stroke', 'rgba(255,255,255,0.3)');
                circle.setAttribute('stroke-width', '1.2');

                const dot = document.createElementNS(ns, 'circle');
                dot.setAttribute('cx', '0');
                dot.setAttribute('cy', '0');
                dot.setAttribute('r', '1.5');
                dot.setAttribute('fill', 'rgba(255,255,255,0.2)');

                crosshair.appendChild(vLine);
                crosshair.appendChild(hLine);
                crosshair.appendChild(circle);
                crosshair.appendChild(dot);
                svg.appendChild(crosshair);
            });
        });

        document.querySelectorAll('.svg-wrap svg').forEach(svg => {
            let tempLine = null;
            let startPointCircle = null;

            function getCoords(e) {
                const rect = svg.getBoundingClientRect();
                const scaleX = svg.viewBox.baseVal.width / rect.width;
                const scaleY = svg.viewBox.baseVal.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                const x = Math.max(0, Math.min(svg.viewBox.baseVal.width, (clientX - rect.left) * scaleX));
                const y = Math.max(0, Math.min(svg.viewBox.baseVal.height, (clientY - rect.top) * scaleY));
                return { x, y };
            }

            function updateCrosshair(x, y) {
                const crosshair = svg.querySelector('.trend-crosshair');
                if (!crosshair) return;
                crosshair.style.display = 'block';
                const vLine = crosshair.children[0];
                const hLine = crosshair.children[1];
                const circle = crosshair.children[2];
                const dot = crosshair.children[3];
                vLine.setAttribute('x1', x);
                vLine.setAttribute('x2', x);
                hLine.setAttribute('y1', y);
                hLine.setAttribute('y2', y);
                circle.setAttribute('cx', x);
                circle.setAttribute('cy', y);
                dot.setAttribute('cx', x);
                dot.setAttribute('cy', y);
            }

            function hideCrosshair() {
                const crosshair = svg.querySelector('.trend-crosshair');
                if (crosshair) crosshair.style.display = 'none';
            }

            function createTempLine(x1, y1, x2, y2) {
                const ns = 'http://www.w3.org/2000/svg';
                if (tempLine) {
                    tempLine.setAttribute('x1', x1);
                    tempLine.setAttribute('y1', y1);
                    tempLine.setAttribute('x2', x2);
                    tempLine.setAttribute('y2', y2);
                    return;
                }
                tempLine = document.createElementNS(ns, 'line');
                tempLine.setAttribute('x1', x1);
                tempLine.setAttribute('y1', y1);
                tempLine.setAttribute('x2', x2);
                tempLine.setAttribute('y2', y2);
                tempLine.setAttribute('stroke', '#ff9b00');
                tempLine.setAttribute('stroke-width', '1.5');
                tempLine.setAttribute('stroke-dasharray', '6,4');
                tempLine.setAttribute('opacity', '0.7');
                tempLine.classList.add('temp-line');
                svg.appendChild(tempLine);
            }

            function removeTempLine() {
                if (tempLine) { tempLine.remove();
                    tempLine = null; }
            }

            function createStartPoint(x, y) {
                const ns = 'http://www.w3.org/2000/svg';
                if (startPointCircle) { startPointCircle.remove();
                    startPointCircle = null; }
                startPointCircle = document.createElementNS(ns, 'circle');
                startPointCircle.setAttribute('cx', x);
                startPointCircle.setAttribute('cy', y);
                startPointCircle.setAttribute('r', '5');
                startPointCircle.setAttribute('fill', 'none');
                startPointCircle.setAttribute('stroke', '#ff9b00');
                startPointCircle.setAttribute('stroke-width', '2');
                startPointCircle.classList.add('start-point');
                svg.appendChild(startPointCircle);
            }

            function removeStartPoint() {
                if (startPointCircle) { startPointCircle.remove();
                    startPointCircle = null; }
            }

            svg.addEventListener('mousedown', function(e) {
                if (svg.dataset.drawing !== 'true') return;
                e.preventDefault();
                const { x, y } = getCoords(e);
                const step = parseInt(svg.dataset.step) || 0;
                const mobile = isMobile();

                if (!mobile) {
                    if (step === 0) {
                        svg.dataset.startX = x;
                        svg.dataset.startY = y;
                        svg.dataset.step = '1';
                        createStartPoint(x, y);
                        createTempLine(x, y, x, y);
                        updateCrosshair(x, y);
                    } else if (step === 1) {
                        const sx = parseFloat(svg.dataset.startX);
                        const sy = parseFloat(svg.dataset.startY);
                        if (sx && sy) {
                            removeTempLine();
                            removeStartPoint();
                            hideCrosshair();
                            const ns = 'http://www.w3.org/2000/svg';
                            const line = document.createElementNS(ns, 'line');
                            line.setAttribute('x1', sx);
                            line.setAttribute('y1', sy);
                            line.setAttribute('x2', x);
                            line.setAttribute('y2', y);
                            line.setAttribute('stroke', '#ff9b00');
                            line.setAttribute('stroke-width', '1.5');
                            line.setAttribute('opacity', '0.9');
                            svg.appendChild(line);
                            saveLine(svg.id, line);
                            svg.dataset.step = '0';
                            svg.dataset.startX = '';
                            svg.dataset.startY = '';
                        }
                    }
                    return;
                }

                if (mobile) {
                    if (step === 0) {
                        updateCrosshair(x, y);
                        svg.dataset.step = '1';
                    } else if (step === 1) {
                        svg.dataset.startX = x;
                        svg.dataset.startY = y;
                        svg.dataset.step = '2';
                        createStartPoint(x, y);
                        createTempLine(x, y, x, y);
                        updateCrosshair(x, y);
                    } else if (step === 2) {
                        const sx = parseFloat(svg.dataset.startX);
                        const sy = parseFloat(svg.dataset.startY);
                        if (sx && sy) {
                            removeTempLine();
                            removeStartPoint();
                            hideCrosshair();
                            const ns = 'http://www.w3.org/2000/svg';
                            const line = document.createElementNS(ns, 'line');
                            line.setAttribute('x1', sx);
                            line.setAttribute('y1', sy);
                            line.setAttribute('x2', x);
                            line.setAttribute('y2', y);
                            line.setAttribute('stroke', '#ff9b00');
                            line.setAttribute('stroke-width', '1.5');
                            line.setAttribute('opacity', '0.9');
                            svg.appendChild(line);
                            saveLine(svg.id, line);
                            svg.dataset.step = '0';
                            svg.dataset.startX = '';
                            svg.dataset.startY = '';
                        }
                    }
                }
            });

            svg.addEventListener('mousemove', function(e) {
                if (svg.dataset.drawing !== 'true') return;
                const { x, y } = getCoords(e);
                const step = parseInt(svg.dataset.step) || 0;
                const mobile = isMobile();
                updateCrosshair(x, y);
                if (!mobile && step === 1) {
                    const sx = parseFloat(svg.dataset.startX);
                    const sy = parseFloat(svg.dataset.startY);
                    if (sx && sy) createTempLine(sx, sy, x, y);
                }
                if (mobile && step === 2) {
                    const sx = parseFloat(svg.dataset.startX);
                    const sy = parseFloat(svg.dataset.startY);
                    if (sx && sy) createTempLine(sx, sy, x, y);
                }
            });

            svg.addEventListener('touchstart', function(e) {
                if (svg.dataset.drawing !== 'true') return;
                e.preventDefault();
                const { x, y } = getCoords(e);
                const step = parseInt(svg.dataset.step) || 0;
                const mobile = isMobile();

                if (!mobile) {
                    if (step === 0) {
                        svg.dataset.startX = x;
                        svg.dataset.startY = y;
                        svg.dataset.step = '1';
                        createStartPoint(x, y);
                        createTempLine(x, y, x, y);
                        updateCrosshair(x, y);
                    } else if (step === 1) {
                        const sx = parseFloat(svg.dataset.startX);
                        const sy = parseFloat(svg.dataset.startY);
                        if (sx && sy) {
                            removeTempLine();
                            removeStartPoint();
                            hideCrosshair();
                            const ns = 'http://www.w3.org/2000/svg';
                            const line = document.createElementNS(ns, 'line');
                            line.setAttribute('x1', sx);
                            line.setAttribute('y1', sy);
                            line.setAttribute('x2', x);
                            line.setAttribute('y2', y);
                            line.setAttribute('stroke', '#ff9b00');
                            line.setAttribute('stroke-width', '1.5');
                            line.setAttribute('opacity', '0.9');
                            svg.appendChild(line);
                            saveLine(svg.id, line);
                            svg.dataset.step = '0';
                            svg.dataset.startX = '';
                            svg.dataset.startY = '';
                        }
                    }
                    return;
                }

                if (mobile) {
                    if (step === 0) {
                        updateCrosshair(x, y);
                        svg.dataset.step = '1';
                    } else if (step === 1) {
                        svg.dataset.startX = x;
                        svg.dataset.startY = y;
                        svg.dataset.step = '2';
                        createStartPoint(x, y);
                        createTempLine(x, y, x, y);
                        updateCrosshair(x, y);
                    } else if (step === 2) {
                        const sx = parseFloat(svg.dataset.startX);
                        const sy = parseFloat(svg.dataset.startY);
                        if (sx && sy) {
                            removeTempLine();
                            removeStartPoint();
                            hideCrosshair();
                            const ns = 'http://www.w3.org/2000/svg';
                            const line = document.createElementNS(ns, 'line');
                            line.setAttribute('x1', sx);
                            line.setAttribute('y1', sy);
                            line.setAttribute('x2', x);
                            line.setAttribute('y2', y);
                            line.setAttribute('stroke', '#ff9b00');
                            line.setAttribute('stroke-width', '1.5');
                            line.setAttribute('opacity', '0.9');
                            svg.appendChild(line);
                            saveLine(svg.id, line);
                            svg.dataset.step = '0';
                            svg.dataset.startX = '';
                            svg.dataset.startY = '';
                        }
                    }
                }
            }, { passive: false });

            svg.addEventListener('touchmove', function(e) {
                if (svg.dataset.drawing !== 'true') return;
                e.preventDefault();
                const { x, y } = getCoords(e);
                const step = parseInt(svg.dataset.step) || 0;
                const mobile = isMobile();
                updateCrosshair(x, y);
                if (!mobile && step === 1) {
                    const sx = parseFloat(svg.dataset.startX);
                    const sy = parseFloat(svg.dataset.startY);
                    if (sx && sy) createTempLine(sx, sy, x, y);
                }
                if (mobile && step === 2) {
                    const sx = parseFloat(svg.dataset.startX);
                    const sy = parseFloat(svg.dataset.startY);
                    if (sx && sy) createTempLine(sx, sy, x, y);
                }
            }, { passive: false });
        });

        document.querySelectorAll('.undo-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const targetId = this.dataset.target;
                const svg = document.getElementById(targetId);
                if (!svg) return;
                const h = getHistory(targetId);
                if (h.undo.length === 0) return;
                const lastLine = h.undo.pop();
                const lines = svg.querySelectorAll('line');
                let found = null;
                for (const line of lines) {
                    if (line === lastLine) { found = line; break; }
                    if (line.getAttribute('x1') === lastLine.getAttribute('x1') &&
                        line.getAttribute('y1') === lastLine.getAttribute('y1') &&
                        line.getAttribute('x2') === lastLine.getAttribute('x2') &&
                        line.getAttribute('y2') === lastLine.getAttribute('y2') &&
                        line.getAttribute('stroke') === lastLine.getAttribute('stroke')) { found = line; break; }
                }
                if (found) { const clone = found.cloneNode(true);
                    h.redo.push(clone);
                    found.remove(); }
                if (svg.dataset.drawing === 'true') {
                    svg.dataset.step = '0';
                    svg.dataset.startX = '';
                    svg.dataset.startY = '';
                    const tl = svg.querySelector('.temp-line');
                    if (tl) tl.remove();
                    const sp = svg.querySelector('.start-point');
                    if (sp) sp.remove();
                    const ch = svg.querySelector('.trend-crosshair');
                    if (ch) ch.style.display = 'none';
                }
            });
        });

        document.querySelectorAll('.redo-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const targetId = this.dataset.target;
                const svg = document.getElementById(targetId);
                if (!svg) return;
                const h = getHistory(targetId);
                if (h.redo.length === 0) return;
                const line = h.redo.pop();
                svg.appendChild(line);
                h.undo.push(line);
            });
        });

        document.querySelectorAll('.clear-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const targetId = this.dataset.target;
                const svg = document.getElementById(targetId);
                if (!svg) return;
                const h = getHistory(targetId);
                const lines = svg.querySelectorAll('line:not(.temp-line)');
                const userLines = [];
                lines.forEach(line => {
                    if (!line.id && !line.classList.contains('grid-line') && line.getAttribute('stroke') ===
                        '#ff9b00') {
                        userLines.push(line);
                    }
                });
                userLines.forEach(line => { h.undo.push(line); });
                userLines.forEach(line => line.remove());
                h.redo = [];
                if (svg.dataset.drawing === 'true') {
                    svg.dataset.step = '0';
                    svg.dataset.startX = '';
                    svg.dataset.startY = '';
                    const tl = svg.querySelector('.temp-line');
                    if (tl) tl.remove();
                    const sp = svg.querySelector('.start-point');
                    if (sp) sp.remove();
                    const ch = svg.querySelector('.trend-crosshair');
                    if (ch) ch.style.display = 'none';
                }
                const trendBtn = document.querySelector(`.trend-btn[data-target="${targetId}"]`);
                if (trendBtn) {
                    trendBtn.classList.remove('active');
                    svg.style.cursor = 'default';
                    svg.dataset.drawing = 'false';
                }
            });
        });

        // INITIALIZATION - از ۱ شروع بشه
        // ================================================================

        window.addEventListener('load', function() {
            // از ۱ شروع میشه
            exercise3Counter = 1;
            document.getElementById('exerciseCounter3').textContent = exercise3Counter;
            bestRecord = getBestRecord();
            document.getElementById('bestRecordDisplay').textContent = bestRecord;
            document.getElementById('newRecordBadge').classList.remove('show');

            // با false صدا بزنیم تا شمارنده افزایش پیدا نکنه (بارگذاری اولیه)
            generateNewExercise3(false);
        });

        console.log('🕯️ Amitis v62 - شروع از ۱، حذف روند را تشخیص دهید، تعداد کل تمرین های حل شده با نئون سفید');
    </script>
